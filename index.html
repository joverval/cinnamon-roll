<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>cinnamon roll | joverval.cl</title>
  <meta name="description" content="Live coding music: a personal Strudel player. TidalCycles port to JavaScript." />
  <link rel="icon" type="image/svg+xml" href="/cinnamon-roll/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1a1f;
      --surface: #222228;
      --surface-hover: #2a2a32;
      --border: #33333a;
      --text: #e4e4ea;
      --text-muted: #888899;
      --text-soft: #666677;
      --accent: #ff6b6b;
      --accent-glow: rgba(255, 107, 107, 0.15);
      --accent-text: #ff8a8a;
      --green: #69db7c;
      --red: #ff6b6b;
      --yellow: #ffd43b;
      --radius: 10px;
      --radius-lg: 16px;
      --font-sans: "Inter", system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      z-index: 10;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.02em;
      color: var(--accent-text);
    }

    .attribution {
      font-size: 11px;
      color: var(--text-soft);
    }
    .attribution a {
      color: var(--accent-text);
      text-decoration: none;
    }
    .attribution a:hover { text-decoration: underline; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Preload sidebar ── */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 200ms ease;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .sidebar-close {
      display: none;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 2px 6px;
    }

    .preload-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .preload-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 13px;
      cursor: pointer;
      border-radius: var(--radius);
      text-align: left;
      transition: background 120ms;
    }

    .preload-item:hover { background: var(--surface-hover); }
    .preload-item.active { background: var(--accent-glow); color: var(--accent-text); }

    .preload-icon {
      font-size: 15px;
      flex-shrink: 0;
    }

    .preload-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preload-loading {
      padding: 20px;
      text-align: center;
      color: var(--text-soft);
      font-size: 13px;
    }

    .preload-error {
      padding: 12px 16px;
      color: var(--red);
      font-size: 12px;
    }

    /* ── Editor area ── */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      position: relative;
    }

    #editor {
      flex: 1;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      font-family: var(--font-mono);
      font-size: 15px;
      line-height: 1.65;
      resize: none;
      outline: none;
      transition: border-color 150ms;
    }

    #editor:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #editor::placeholder {
      color: var(--text-soft);
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 150ms, transform 100ms;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }

    .btn-play {
      background: var(--green);
      color: #1a1a1f;
      min-width: 100px;
    }
    .btn-play:hover { background: #51cf66; }
    .btn-play:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-stop {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      min-width: 100px;
    }
    .btn-stop:hover { background: var(--surface-hover); }

    .btn-preloads {
      display: none;
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 12px 16px;
    }
    .btn-preloads:hover { background: var(--surface-hover); }

    .status-text {
      font-size: 13px;
      color: var(--text-muted);
      margin-left: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status-text.error { color: var(--red); }
    .status-text.playing { color: var(--green); }

    /* ── Error panel ── */
    .error-panel {
      background: rgba(255, 107, 107, 0.08);
      border-top: 1px solid rgba(255, 107, 107, 0.2);
      padding: 12px 20px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--red);
      display: none;
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .error-panel.visible { display: block; }

    /* ── Sidebar overlay (mobile) ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 20;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 21;
        transform: translateX(-100%);
        width: 280px;
        box-shadow: 4px 0 20px rgba(0,0,0,0.3);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .sidebar-close { display: block; }
      .btn-preloads { display: inline-flex; }
      .topbar .attribution { display: none; }
      #editor { font-size: 14px; padding: 14px 16px; }
    }

    @media (max-width: 400px) {
      .topbar-left { gap: 8px; }
      .logo { font-size: 15px; }
      .btn { padding: 10px 18px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo">cinnamon roll</span>
      <span class="attribution">
        a personal <a href="https://strudel.cc" target="_blank" rel="noopener">Strudel</a> player
        &middot; TidalCycles port to JavaScript
      </span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-preloads" id="btnPreloads" aria-label="Open preloads">
        📂 Preloads
      </button>
    </div>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main -->
  <div class="main">
    <!-- Preload sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Preloads</h2>
        <button class="sidebar-close" id="btnSidebarClose" aria-label="Close">&times;</button>
      </div>
      <div class="preload-list" id="preloadList">
        <div class="preload-loading">Loading...</div>
      </div>
    </aside>

    <!-- Editor -->
    <div class="editor-area">
      <div class="editor-container" id="editorContainer">
        <textarea
          id="editor"
          placeholder="s('bd sd').jux(rev)"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="none"
        ></textarea>
      </div>

      <div class="controls">
        <button class="btn btn-play" id="btnPlay">▶ Play</button>
        <button class="btn btn-stop" id="btnStop">⏹ Stop</button>
        <span class="status-text" id="statusText"></span>
      </div>

      <div class="error-panel" id="errorPanel"></div>
    </div>
  </div>

  <!-- Strudel engine -->
  <script src="https://unpkg.com/@strudel/web@1.2.6"></script>

  <!-- App -->
  <script>
  (function() {
    /* ── DOM refs ── */
    const editor    = document.getElementById('editor');
    const btnPlay   = document.getElementById('btnPlay');
    const btnStop   = document.getElementById('btnStop');
    const btnPreloads = document.getElementById('btnPreloads');
    const btnSidebarClose = document.getElementById('btnSidebarClose');
    const sidebar   = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const preloadList = document.getElementById('preloadList');
    const statusText = document.getElementById('statusText');
    const errorPanel = document.getElementById('errorPanel');

    let isPlaying = false;
    let activePreload = null;
    let engineReady = false;

    /* ── Sidebar toggle ── */
    function openSidebar() {
      sidebar.classList.add('open');
      sidebarOverlay.classList.add('open');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    }
    btnPreloads.addEventListener('click', openSidebar);
    btnSidebarClose.addEventListener('click', closeSidebar);
    sidebarOverlay.addEventListener('click', closeSidebar);

    /* ── Status / errors ── */
    function setStatus(msg, cls) {
      statusText.textContent = msg;
      statusText.className = 'status-text ' + (cls || '');
    }

    function showError(msg) {
      errorPanel.textContent = msg;
      errorPanel.classList.add('visible');
      setStatus('Error', 'error');
    }

    function clearError() {
      errorPanel.classList.remove('visible');
      errorPanel.textContent = '';
    }

    /* ── Engine init ── */
    async function initEngine() {
      setStatus('Loading samples...');
      try {
        // initStrudel is global from @strudel/web script
        await initStrudel({
          prebake: () => samples('samples/strudel.json'),
        });
        engineReady = true;
        setStatus('Ready');

        // Catch runtime errors from the pattern scheduler
        document.addEventListener('strudel.log', function(e) {
          if (e.detail && e.detail.type === 'error') {
            showError(e.detail.message || 'Runtime error');
          }
        });
      } catch (e) {
        engineReady = false;
        setStatus('Failed to load samples', 'error');
        console.error(e);
      }
    }

    /* ── Play / Stop ── */
    function play() {
      if (!engineReady) {
        setStatus('Samples still loading...', 'error');
        return;
      }
      const code = editor.value.trim();
      if (!code) return;

      clearError();
      try {
        // evaluate() is global from @strudel/web
        evaluate(code);
        isPlaying = true;
        setStatus('Playing', 'playing');
      } catch (e) {
        showError(e.message || String(e));
        isPlaying = false;
      }
    }

    function stop() {
      // hush() via evaluate (same context that plays), plus direct call as backup
      try { evaluate('hush()'); } catch(e) {}
      try { if (typeof hush !== 'undefined') hush(); } catch(e) {}
      isPlaying = false;
      setStatus('Stopped');
    }

    btnPlay.addEventListener('click', play);
    btnStop.addEventListener('click', stop);

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      // Ctrl+Enter / Cmd+Enter to play
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        play();
      }
      // Escape to stop
      if (e.key === 'Escape' && document.activeElement !== editor) {
        stop();
      }
    });

    /* ── Preloads ── */
    const PRELOADS_BASE = 'preloads';

    async function loadPreloads() {
      try {
        const resp = await fetch(PRELOADS_BASE + '/manifest.json');
        if (!resp.ok) throw new Error('manifest: ' + resp.status);

        const preloads = await resp.json();

        if (preloads.length === 0) {
          preloadList.innerHTML = '<div class="preload-loading">No preloads yet</div>';
          return;
        }

        preloadList.innerHTML = '';
        preloads.forEach(function(entry) {
          const item = document.createElement('button');
          item.className = 'preload-item';
          item.innerHTML =
            '<span class="preload-icon">📄</span>' +
            '<span class="preload-name">' + escapeHtml(entry.name) + '</span>';
          item.addEventListener('click', function() {
            loadPreloadFile(PRELOADS_BASE + '/' + entry.file, entry.name);
          });
          preloadList.appendChild(item);
        });
      } catch (e) {
        preloadList.innerHTML =
          '<div class="preload-error">Could not load preloads: ' +
          escapeHtml(e.message) + '</div>';
        console.error(e);
      }
    }

    async function loadPreloadFile(url, name) {
      setStatus('Loading ' + name + '...');
      clearError();
      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const code = await resp.text();

        editor.value = code;

        // Update active state in sidebar
        document.querySelectorAll('.preload-item').forEach(function(el) {
          el.classList.remove('active');
        });
        var items = document.querySelectorAll('.preload-item');
        items.forEach(function(el) {
          if (el.querySelector('.preload-name').textContent === name) {
            el.classList.add('active');
          }
        });
        activePreload = name;

        setStatus('Loaded: ' + name);

        // Auto-play on load
        stop();
        setTimeout(function() { play(); }, 100);

        // Close sidebar on mobile
        if (window.innerWidth <= 768) {
          closeSidebar();
        }
      } catch (e) {
        showError('Failed to load ' + name + ': ' + e.message);
      }
    }

    /* ── URL param: ?load=filename ── */
    function handleUrlParams() {
      var params = new URLSearchParams(window.location.search);
      var loadFile = params.get('load');
      if (loadFile) {
        loadPreloadFile(PRELOADS_BASE + '/' + loadFile + '.js', loadFile);
      }
    }

    /* ── Helpers ── */
    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /* ── Bootstrap ── */
    initEngine();
    loadPreloads();
    handleUrlParams();

    /* ── Auto-resize editor on window resize ── */
    // (textarea fills flex container, no manual resize needed)

    // Report ready
    console.log('%ccinnamon roll ready %cjoverval.cl/cinnamon-roll',
      'color:#ff8a8a;font-weight:bold', 'color:#888');
  })();
  </script>
</body>
</html>
