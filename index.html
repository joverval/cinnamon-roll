<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>cinnamon roll | joverval.cl</title>
  <meta name="description" content="Live coding music: a personal Strudel player. TidalCycles port to JavaScript." />
  <link rel="icon" href="/cinnamon-roll/favicon.ico" />
  <link rel="apple-touch-icon" href="/cinnamon-roll/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body onclick="var d=document.getElementById('menuDropdown');if(!d.contains(event.target)&&event.target.id!=='btnMenu')d.classList.remove('open')">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo">
        <img class="logo-icon" src="/cinnamon-roll/favicon.png" alt="" />
        cinnamon roll
      </span>
      <span class="attribution">
        a personal <a href="https://strudel.cc" target="_blank" rel="noopener">Strudel</a> player
        &middot; TidalCycles port to JavaScript
      </span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-preloads" id="btnPreloads" aria-label="Open preloads">
        📂 Preloads
      </button>
      <button class="btn btn-sounds" id="btnSounds" aria-label="Toggle sounds">
        🔊 Sounds
      </button>
      <button class="btn btn-menu" id="btnMenu" aria-label="Menu" onclick="console.log('menu clicked');var d=document.getElementById('menuDropdown');d.classList.toggle('open');console.log('open?',d.classList.contains('open'))">
        ☰
      </button>
    </div>
  </div>

  <!-- Mobile menu dropdown -->
  <div class="menu-dropdown" id="menuDropdown" onclick="event.stopPropagation()">
    <button class="menu-item" id="menuPreloads" onclick="this.parentElement.classList.remove('open');openSidebar()">📂 Preloads</button>
    <button class="menu-item" id="menuSounds" onclick="this.parentElement.classList.remove('open');toggleSounds()">🔊 Sounds</button>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main -->
  <div class="main">
    <!-- Preload sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Preloads</h2>
        <button class="sidebar-close" id="btnSidebarClose" aria-label="Close">&times;</button>
      </div>
      <div class="preload-list" id="preloadList">
        <div class="preload-loading">Loading...</div>
      </div>
    </aside>

    <!-- Editor -->
    <div class="editor-area">
      <div class="editor-container" id="editorContainer">
        <textarea
          id="editor"
          placeholder="s('bd sd').jux(rev)"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="none"
        ></textarea>
      </div>

      <div class="punchcard-wrap" id="punchcardWrap">
        <canvas id="punchcardCanvas"></canvas>
      </div>

      <div class="controls">
        <button class="btn btn-play" id="btnPlay">▶ Play</button>
        <button class="btn btn-pause" id="btnPause">⏸ Pause</button>
        <button class="btn btn-stop" id="btnStop">⏹ Stop</button>
        <button class="btn btn-export" id="btnExport" disabled>⏺ Export</button>
      </div>

      <div class="error-panel" id="errorPanel"></div>
    </div>

    <!-- Sounds panel (right side, desktop) -->
    <aside class="sounds-panel" id="soundsPanel">
      <div class="sounds-header">
        <h2>Sounds</h2>
        <input class="sounds-search" type="text" id="soundsSearch" placeholder="Filter..." autocomplete="off" />
        <button class="sounds-close" id="btnSoundsClose" aria-label="Close">&times;</button>
      </div>
      <div class="sounds-list" id="soundsList">
        <div class="sounds-loading">Loading...</div>
      </div>
    </aside>
  </div>

  <!-- Export modal -->
  <div class="export-overlay" id="exportOverlay">
    <div class="export-modal">
      <h3>Export Audio</h3>
      <div class="export-settings" id="exportSettings">
        <p class="export-label">Duration</p>
        <div class="export-duration-row">
          <input class="export-input" type="text" id="exportDuration" value="1:00" placeholder="1:00" autocomplete="off" />
          <span class="export-hint">mm:ss or seconds</span>
        </div>
        <p class="export-label">Format</p>
        <div class="export-format-row">
          <label class="export-radio"><input type="radio" name="exportFormat" value="mp3" checked /> MP3 (128 kbps)</label>
          <label class="export-radio"><input type="radio" name="exportFormat" value="wav" /> WAV (lossless)</label>
        </div>
      </div>
      <div class="export-progress" id="exportProgress" style="display:none">
        <span id="exportTimer">0:00</span>
        <div class="export-bar-track"><div class="export-bar-fill" id="exportBarFill"></div></div>
      </div>
      <div class="export-actions">
        <button class="btn btn-export-cancel" id="btnExportCancel">Cancel</button>
        <button class="btn btn-export-proceed" id="btnExportProceed">Proceed</button>
      </div>
    </div>
  </div>

  <!-- Strudel engine -->
  <script src="https://unpkg.com/@strudel/web@1.3.0"></script>

  <!-- App -->
  <script src="app.js"></script>
</body>
</html>
