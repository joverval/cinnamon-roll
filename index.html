<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>cinnamon roll | joverval.cl</title>
  <meta name="description" content="Live coding music: a personal Strudel player. TidalCycles port to JavaScript." />
  <link rel="icon" type="image/svg+xml" href="/cinnamon-roll/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1a1f;
      --surface: #222228;
      --surface-hover: #2a2a32;
      --border: #33333a;
      --text: #e4e4ea;
      --text-muted: #888899;
      --text-soft: #666677;
      --accent: #ff6b6b;
      --accent-glow: rgba(255, 107, 107, 0.15);
      --accent-text: #ff8a8a;
      --green: #69db7c;
      --red: #ff6b6b;
      --yellow: #ffd43b;
      --radius: 10px;
      --radius-lg: 16px;
      --font-sans: "Inter", system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      z-index: 10;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.02em;
      color: var(--accent-text);
    }

    .attribution {
      font-size: 11px;
      color: var(--text-soft);
    }
    .attribution a {
      color: var(--accent-text);
      text-decoration: none;
    }
    .attribution a:hover { text-decoration: underline; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Preload sidebar ── */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 200ms ease;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .sidebar-close {
      display: none;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 2px 6px;
    }

    .preload-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .preload-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 13px;
      cursor: pointer;
      border-radius: var(--radius);
      text-align: left;
      transition: background 120ms;
    }

    .preload-item:hover { background: var(--surface-hover); }
    .preload-item.active { background: var(--accent-glow); color: var(--accent-text); }

    .preload-icon {
      font-size: 15px;
      flex-shrink: 0;
    }

    .preload-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preload-loading {
      padding: 20px;
      text-align: center;
      color: var(--text-soft);
      font-size: 13px;
    }

    .preload-error {
      padding: 12px 16px;
      color: var(--red);
      font-size: 12px;
    }

    /* ── Editor area ── */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      position: relative;
    }

    #editor {
      flex: 1;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      font-family: var(--font-mono);
      font-size: 15px;
      line-height: 1.65;
      resize: none;
      outline: none;
      transition: border-color 150ms;
    }

    #editor:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #editor::placeholder {
      color: var(--text-soft);
    }

    /* ── Controls ── */
    .punchcard-wrap {
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      height: 130px;
      overflow: hidden;
    }
    #punchcardCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 150ms, transform 100ms;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }

    .btn-play {
      background: var(--green);
      color: #1a1a1f;
      min-width: 100px;
    }
    .btn-play:hover { background: #51cf66; }
    .btn-play:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-stop {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      min-width: 100px;
    }
    .btn-stop:hover { background: var(--surface-hover); }

    .btn-preloads {
      display: none;
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 12px 16px;
    }
    .btn-preloads:hover { background: var(--surface-hover); }

    .status-text {
      font-size: 13px;
      color: var(--text-muted);
      margin-left: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status-text.error { color: var(--red); }
    .status-text.playing { color: var(--green); }

    /* ── Error panel ── */
    .error-panel {
      background: rgba(255, 107, 107, 0.08);
      border-top: 1px solid rgba(255, 107, 107, 0.2);
      padding: 12px 20px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--red);
      display: none;
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .error-panel.visible { display: block; }

    /* ── Sidebar overlay (mobile) ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 20;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 21;
        transform: translateX(-100%);
        width: 280px;
        box-shadow: 4px 0 20px rgba(0,0,0,0.3);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .sidebar-close { display: block; }
      .btn-preloads { display: inline-flex; }
      .topbar .attribution { display: none; }
      #editor { font-size: 14px; padding: 14px 16px; }
    }

    @media (max-width: 400px) {
      .topbar-left { gap: 8px; }
      .logo { font-size: 15px; }
      .btn { padding: 10px 18px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo">cinnamon roll</span>
      <span class="attribution">
        a personal <a href="https://strudel.cc" target="_blank" rel="noopener">Strudel</a> player
        &middot; TidalCycles port to JavaScript
      </span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-preloads" id="btnPreloads" aria-label="Open preloads">
        📂 Preloads
      </button>
    </div>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main -->
  <div class="main">
    <!-- Preload sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Preloads</h2>
        <button class="sidebar-close" id="btnSidebarClose" aria-label="Close">&times;</button>
      </div>
      <div class="preload-list" id="preloadList">
        <div class="preload-loading">Loading...</div>
      </div>
    </aside>

    <!-- Editor -->
    <div class="editor-area">
      <div class="editor-container" id="editorContainer">
        <textarea
          id="editor"
          placeholder="s('bd sd').jux(rev)"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="none"
        ></textarea>
      </div>

      <div class="punchcard-wrap" id="punchcardWrap">
        <canvas id="punchcardCanvas"></canvas>
      </div>

      <div class="controls">
        <button class="btn btn-play" id="btnPlay">▶ Play</button>
        <button class="btn btn-stop" id="btnStop">⏹ Stop</button>
        <span class="status-text" id="statusText"></span>
      </div>

      <div class="error-panel" id="errorPanel"></div>
    </div>
  </div>

  <!-- Strudel engine -->
  <script src="https://unpkg.com/@strudel/web@1.2.6"></script>

  <!-- App -->
  <script>
  (function() {
    /* ── DOM refs ── */
    const editor    = document.getElementById('editor');
    const btnPlay   = document.getElementById('btnPlay');
    const btnStop   = document.getElementById('btnStop');
    const btnPreloads = document.getElementById('btnPreloads');
    const btnSidebarClose = document.getElementById('btnSidebarClose');
    const sidebar   = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const preloadList = document.getElementById('preloadList');
    const statusText = document.getElementById('statusText');
    const errorPanel = document.getElementById('errorPanel');
    const punchcardCanvas = document.getElementById('punchcardCanvas');
    const punchcardCtx = punchcardCanvas.getContext('2d');

    let isPlaying = false;
    let activePreload = null;
    let engineReady = false;

    /* ── Sidebar toggle ── */
    function openSidebar() {
      sidebar.classList.add('open');
      sidebarOverlay.classList.add('open');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    }
    btnPreloads.addEventListener('click', openSidebar);
    btnSidebarClose.addEventListener('click', closeSidebar);
    sidebarOverlay.addEventListener('click', closeSidebar);

    /* ── Status / errors ── */
    function setStatus(msg, cls) {
      statusText.textContent = msg;
      statusText.className = 'status-text ' + (cls || '');
    }

    function showError(msg) {
      errorPanel.textContent = msg;
      errorPanel.classList.add('visible');
      setStatus('Error', 'error');
    }

    function clearError() {
      errorPanel.classList.remove('visible');
      errorPanel.textContent = '';
    }

    /* ── Punchcard ── */
    var punchcard = {
      animId: null,
      events: [],     // {time, label} — cycle time + note/sound name
            rows: [],       // unique row labels
            startCycle: 0,
            cycleLen: 1,
            viewRow: 0,
            targetRow: 0,
            _onNote: null,  // event handler ref

      init: function() {
        this.events = [];
        this.rows = [];
        this.resize();
      },

      resize: function() {
        var dpr = window.devicePixelRatio || 1;
        var rect = punchcardCanvas.getBoundingClientRect();
        punchcardCanvas.width = rect.width * dpr;
        punchcardCanvas.height = rect.height * dpr;
        punchcardCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      },
      /** Extract a display label from a hap value.
       *  Handles: strings ("bd"), numbers (note midi), objects ({s:"bd"}, {note:"C4"}, {n:0}) */
            labelFromValue: function(v) {
              if (v == null) return null;
              if (typeof v === 'string') return v;
              if (typeof v === 'number') {
                var nn = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
                var midi = Math.round(v) + 60;
                var oct = Math.floor(midi / 12) - 1;
                return nn[((midi % 12) + 12) % 12] + oct;
              }
              if (typeof v !== 'object') return null;
              if (v.note) return String(v.note);
              if (v.s) return String(v.s);
              if (v.n != null) {
                var nn = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
                var midi = parseInt(v.n) + 60;
                var oct = Math.floor(midi / 12) - 1;
                return nn[((midi % 12) + 12) % 12] + oct;
              }
              if (v.value != null) return String(v.value);
              if (v.freq) return Math.round(12 * Math.log2(v.freq / 440) + 69) + '';
              return null;
            },

            start: function() {
              if (this.animId) return;
              this.events = [];
              this._seen = {};  // dedup key -> true
              this.init();

              // Listen for punchcard-note events from onTrigger hook
              var self = this;
              this._onNote = function(e) {
                console.log("[pn] handler event:", e.detail);
                if (!e.detail || e.detail.value == null) {
                  console.log("[pn] handler: no detail/value");
                  return;
                }
                var label = self.labelFromValue(e.detail.value);
                console.log("[pn] handler: labelFromValue ->", label, "from value:", e.detail.value);
                if (!label) return;

                // Get cycle time
                var t = e.detail.time || 0;
                // Normalize to 0..1 within current cycle
                var cycleFrac = (t % self.cycleLen) / self.cycleLen;
                if (!isFinite(cycleFrac)) cycleFrac = 0;

                // Deduplicate: same label at roughly same time position
                var dedupKey = label + '_' + (Math.round(cycleFrac * 1000) / 1000);
                if (self._seen[dedupKey]) return;
                self._seen[dedupKey] = true;

                self.events.push({ time: cycleFrac, label: String(label) });

                // Track this row
                if (self.rows.indexOf(label) === -1) {
                  self.rows.push(label);
                  self.rows.sort();
                }

                // Prune old events (keep last 200)
                if (self.events.length > 200) {
                  self.events = self.events.slice(-200);
                }
              };
              document.addEventListener('pn', this._onNote);

              // Start cycle timing
              try { this.startCycle = getTime ? getTime() : 0; } catch(e) { this.startCycle = 0; }
              try { this.cycleLen = cps ? (1 / (cps() || 1)) : 1; } catch(e) { this.cycleLen = 1; }
              if (!isFinite(this.cycleLen) || this.cycleLen <= 0) this.cycleLen = 1;

              var col = 0;
              function frame() {
                self.animId = requestAnimationFrame(frame);
                self.draw();
              }
              frame();
            },

            stop: function() {
              if (this.animId) {
                cancelAnimationFrame(this.animId);
                this.animId = null;
              }
              if (this._onNote) {
                document.removeEventListener('pn', this._onNote);
                this._onNote = null;
              }
              punchcardCtx.clearRect(0, 0, punchcardCanvas.width, punchcardCanvas.height);
            },

      getPlayhead: function() {
        try {
          var t = getTime ? getTime() : (performance.now() / 1000);
          return ((t - this.startCycle) % this.cycleLen) / this.cycleLen;
        } catch(e) {
          return (performance.now() / 1000) % 1;
        }
      },

      draw: function() {
        // Refresh cycle length in case cps changed
        try {
          var cl = cps ? (1 / (cps() || 1)) : 1;
          if (isFinite(cl) && cl > 0) this.cycleLen = cl;
        } catch(e) {}

        var ctx = punchcardCtx;
        var dpr = window.devicePixelRatio || 1;
        var w = punchcardCanvas.width / dpr;
        var h = punchcardCanvas.height / dpr;

        // Dark background
        ctx.fillStyle = '#1a1a1f';
        ctx.fillRect(0, 0, w, h);

        var nRows = Math.max(this.rows.length, 4);
        var labelW = 60;
        var gridW = w - labelW - 8;
        var rowH = Math.min(28, h / 6);          // fixed row height, allow scrolling
        var visibleRows = Math.floor(h / rowH);
        var totalGridH = nRows * rowH;
        var offsetY = 0;

        var ph = this.getPlayhead();
        var PLAYHEAD_X = labelW + 4 + gridW * 0.25;

        // Auto-scroll: find active rows near playhead
        var activeRow = -1;
        var self = this;
        (this.events || []).forEach(function(ev) {
          var dist = Math.abs(ev.time - ph);
          if (dist < 0.05 && activeRow === -1) {
            var ri = self.rows.indexOf(ev.label);
            if (ri >= 0) activeRow = ri;
          }
        });
        // Smooth scroll toward active row
        if (activeRow >= 0) {
          this.targetRow = activeRow - Math.floor(visibleRows / 2);
        }
        this.targetRow = Math.max(0, Math.min(nRows - visibleRows, this.targetRow));
        this.viewRow += (this.targetRow - this.viewRow) * 0.1;

        // Clip to grid area
        ctx.save();
        ctx.beginPath();
        ctx.rect(labelW + 4, 0, gridW, h);
        ctx.clip();

        // Draw visible rows
        var startRow = Math.floor(this.viewRow);
        var rowOffset = (this.viewRow - startRow) * rowH;
        var endRow = Math.min(nRows, startRow + visibleRows + 1);

        for (var r = startRow; r < endRow; r++) {
          var y = (r - startRow) * rowH - rowOffset;

          // Row background
          ctx.fillStyle = r % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.04)';
          ctx.fillRect(labelW + 4, y, gridW, rowH);

          // Label
          ctx.fillStyle = '#888899';
          ctx.font = '11px monospace';
          ctx.textAlign = 'right';
          ctx.textBaseline = 'middle';
          ctx.fillText(this.rows[r] || '', labelW, y + rowH / 2);

          // Note events
          var rowLabel = this.rows[r];
          var CYCLES = 3;

          for (var cycle = -1; cycle < CYCLES - 1; cycle++) {
            (this.events || []).forEach(function(ev) {
              if (ev.label !== rowLabel) return;
              var relTime = ev.time - ph + cycle;
              var pixelOffset = relTime * gridW;
              var ex = PLAYHEAD_X + pixelOffset;
              var ew = Math.max(3, gridW / 80);
              var eh = rowH - 2;

              if (ex + ew < labelW + 4 || ex > labelW + 4 + gridW) return;

              var dist = Math.abs(relTime);
              var alpha = Math.max(0.08, 0.75 - dist * 0.5);
              if (dist > 1.5) alpha = 0.05;

              ctx.fillStyle = 'rgba(255,140,140,' + alpha.toFixed(2) + ')';
              ctx.beginPath();
              ctx.roundRect(ex, y + 1, ew, eh, 2);
              ctx.fill();
            });
          }

          // Row separator
          ctx.strokeStyle = 'rgba(255,255,255,0.05)';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(labelW + 4, y + rowH);
          ctx.lineTo(labelW + 4 + gridW, y + rowH);
          ctx.stroke();
        }

        ctx.restore();

        // Playhead line (stationary, full height)
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(PLAYHEAD_X, 0);
        ctx.lineTo(PLAYHEAD_X, h);
        ctx.stroke();

        // Playhead triangle on top
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.beginPath();
        ctx.moveTo(PLAYHEAD_X - 5, 0);
        ctx.lineTo(PLAYHEAD_X + 5, 0);
        ctx.lineTo(PLAYHEAD_X, 6);
        ctx.closePath();
        ctx.fill();

        // Beat markers (scroll with grid)
        ctx.save();
        ctx.beginPath();
        ctx.rect(labelW + 4, 0, gridW, h);
        ctx.clip();
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 0.5;
        for (var b = -8; b <= 8; b++) {
          var bx = PLAYHEAD_X + (b / 4 - ph) * gridW;
          if (bx < labelW + 4 || bx > labelW + 4 + gridW) continue;
          ctx.beginPath();
          ctx.moveTo(bx, 0);
          ctx.lineTo(bx, h);
          ctx.stroke();
        }
        ctx.restore();
      }
    };

    /* ── Engine init ── */
    async function initEngine() {
      setStatus('Loading samples...');
      try {
        // initStrudel is global from @strudel/web script
        await initStrudel({
          prebake: () => samples('samples/strudel.json'),
        });
        engineReady = true;
        setStatus('Ready');

        // Catch runtime errors from the pattern scheduler
        document.addEventListener('strudel.log', function(e) {
          if (e.detail && e.detail.type === 'error') {
            showError(e.detail.message || 'Runtime error');
          }
        });
      } catch (e) {
        engineReady = false;
        setStatus('Failed to load samples', 'error');
        console.error(e);
      }
    }

    /* ── Play / Stop ── */

    /**
     * Detect if a line looks like a strudel pattern expression.
     * Returns: true = pattern starter, null = chain continuation, false = not a pattern
     */
    function looksLikePattern(line) {
      if (/^\s*\./.test(line)) return null;     // chain continuation
      var t = line.trim().replace(/;+\s*$/, '');
      if (!t) return false;

      // Strudel function starters that produce patterns
      if (/^(s|note|n|sound|h|stack|pure|silence|sequence|seqPLoop|fastcat|cat|timecat|randcat|choose|chooseCycles|rand|irand|perlin|cosine|sine|square|saw|tri|wchoose|wchooseCycles|chooseWith|chooseIn|chooseInWith|signal)\b/.test(t)) return true;

      // String literal (mini syntax — strudel auto-coerces)
      if (/^["']/.test(t)) return true;

      // Pure number (coerced to constant pattern)
      if (/^-?\d+(\.\d+)?$/.test(t)) return true;

      return false;
    }

    function wrapForPunchcard(code) {
      var lines = code.split('\n');
      // Trim trailing empty lines
      while (lines.length && !lines[lines.length-1].trim()) lines.pop();
      if (!lines.length) return code;

      // Find the last pattern expression (search backward from end).
      // A pattern may span multiple lines via chain continuations (.fast, .note, etc.)
      var patternStart = -1, patternEnd = -1;
      for (var i = lines.length - 1; i >= 0; i--) {
        var line = lines[i];
        if (!line.trim()) continue;
        var kind = looksLikePattern(line);
        if (kind === null) continue;   // chain — keep searching for the start
        if (kind === true) {
          patternStart = i;
          patternEnd = i;
          // Collect chain continuation lines after the start (.fast, .note, etc.)
          // Skip empty lines but stop at the first non-empty, non-chain line
          for (var j = i + 1; j < lines.length; j++) {
            if (!lines[j].trim()) continue;
            if (/^\s*\./.test(lines[j])) {
              patternEnd = j;
            } else {
              break;
            }
          }
          break;
        }
        // kind === false — not a pattern (function call, assignment, etc.)
      }

      // No pattern found — return code unchanged (punchcard will have no data)
      if (patternStart === -1) return code;

      // Build full pattern expression (may be multi-line)
      var patternExpr = lines.slice(patternStart, patternEnd + 1).join('\n');
      patternExpr = patternExpr.replace(/;+\s*$/, '');

      // All non-pattern lines go into prefix (executed before the pattern)
      var prefix = [];
      for (var m = 0; m < lines.length; m++) {
        if (m < patternStart || m > patternEnd) prefix.push(lines[m]);
      }

      // Wrap pattern with .onTrigger() which fires once per audio trigger
      var wrapped = patternExpr + '.onTrigger(function(hap){' +
        'try{' +
          'console.log("[pn] trigger", typeof hap, hap && JSON.stringify(hap.value));' +
          'document.dispatchEvent(new CustomEvent("pn",{' +
            'detail:{value: hap && hap.value ? hap.value : hap, time: typeof getTime!=="undefined" ? getTime() : 0}' +
          '}))' +
        '}catch(e){console.error("[pn] trigger error:", e)}' +
      '})';

      console.log("[pn] Wrapped code:", wrapped);

      var prefixStr = prefix.join('\n').trim();
      return prefixStr ? prefixStr + '\n' + wrapped : wrapped;
    }

    function play() {
      if (!engineReady) {
        setStatus('Samples still loading...', 'error');
        return;
      }
      var code = editor.value.trim();
      if (!code) return;

      clearError();
      try {
        punchcard.start();
        evaluate(wrapForPunchcard(code));
        isPlaying = true;
        setStatus('Playing', 'playing');
      } catch (e) {
        showError(e.message || String(e));
        isPlaying = false;
      }
    }

    function stop() {
      try { evaluate('hush()'); } catch(e) {}
      try { if (typeof hush !== 'undefined') hush(); } catch(e) {}
      isPlaying = false;
      setStatus('Stopped');
      punchcard.stop();
    }

    btnPlay.addEventListener('click', play);
    btnStop.addEventListener('click', stop);

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      // Ctrl+Enter / Cmd+Enter to play
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        play();
      }
      // Escape to stop
      if (e.key === 'Escape' && document.activeElement !== editor) {
        stop();
      }
    });

    /* ── Preloads ── */
    const PRELOADS_BASE = 'preloads';

    async function loadPreloads() {
      try {
        const resp = await fetch(PRELOADS_BASE + '/manifest.json');
        if (!resp.ok) throw new Error('manifest: ' + resp.status);

        const preloads = await resp.json();

        if (preloads.length === 0) {
          preloadList.innerHTML = '<div class="preload-loading">No preloads yet</div>';
          return;
        }

        preloadList.innerHTML = '';
        preloads.forEach(function(entry) {
          const item = document.createElement('button');
          item.className = 'preload-item';
          item.innerHTML =
            '<span class="preload-icon">📄</span>' +
            '<span class="preload-name">' + escapeHtml(entry.name) + '</span>';
          item.addEventListener('click', function() {
            loadPreloadFile(PRELOADS_BASE + '/' + entry.file, entry.name);
          });
          preloadList.appendChild(item);
        });
      } catch (e) {
        preloadList.innerHTML =
          '<div class="preload-error">Could not load preloads: ' +
          escapeHtml(e.message) + '</div>';
        console.error(e);
      }
    }

    async function loadPreloadFile(url, name) {
      setStatus('Loading ' + name + '...');
      clearError();
      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const code = await resp.text();

        editor.value = code;

        // Update active state in sidebar
        document.querySelectorAll('.preload-item').forEach(function(el) {
          el.classList.remove('active');
        });
        var items = document.querySelectorAll('.preload-item');
        items.forEach(function(el) {
          if (el.querySelector('.preload-name').textContent === name) {
            el.classList.add('active');
          }
        });
        activePreload = name;

        setStatus('Loaded: ' + name);

        // Auto-play on load
        stop();
        setTimeout(function() { play(); }, 100);

        // Close sidebar on mobile
        if (window.innerWidth <= 768) {
          closeSidebar();
        }
      } catch (e) {
        showError('Failed to load ' + name + ': ' + e.message);
      }
    }

    /* ── URL param: ?load=filename ── */
    function handleUrlParams() {
      var params = new URLSearchParams(window.location.search);
      var loadFile = params.get('load');
      if (loadFile) {
        loadPreloadFile(PRELOADS_BASE + '/' + loadFile + '.js', loadFile);
      }
    }

    /* ── Helpers ── */
    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /* ── Bootstrap ── */
    initEngine();
    loadPreloads();
    handleUrlParams();

    // Keep punchcard sized on window resize
    window.addEventListener('resize', function() {
      punchcard.resize();
    });

    /* ── Auto-resize editor on window resize ── */
    // (textarea fills flex container, no manual resize needed)

    // Report ready
    console.log('%ccinnamon roll ready %cjoverval.cl/cinnamon-roll',
      'color:#ff8a8a;font-weight:bold', 'color:#888');
  })();
  </script>
