<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>cinnamon roll | joverval.cl</title>
  <meta name="description" content="Live coding music: a personal Strudel player. TidalCycles port to JavaScript." />
  <link rel="icon" href="/cinnamon-roll/favicon.ico" />
  <link rel="apple-touch-icon" href="/cinnamon-roll/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1a1f;
      --surface: #222228;
      --surface-hover: #2a2a32;
      --border: #33333a;
      --text: #e4e4ea;
      --text-muted: #888899;
      --text-soft: #666677;
      --accent: #ff6b6b;
      --accent-glow: rgba(255, 107, 107, 0.15);
      --accent-text: #ff8a8a;
      --green: #69db7c;
      --red: #ff6b6b;
      --yellow: #ffd43b;
      --radius: 10px;
      --radius-lg: 16px;
      --font-sans: "Inter", system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      z-index: 10;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-weight: 700;
      font-size: 30px;
      letter-spacing: -0.02em;
      color: var(--accent-text);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      height: 1em;
      width: auto;
      display: inline-block;
      vertical-align: middle;
    }

    .attribution {
      font-size: 11px;
      color: var(--text-soft);
    }
    .attribution a {
      color: var(--accent-text);
      text-decoration: none;
    }
    .attribution a:hover { text-decoration: underline; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Preload sidebar ── */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 200ms ease;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .sidebar-close {
      display: none;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 2px 6px;
    }

    .preload-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .preload-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 13px;
      cursor: pointer;
      border-radius: var(--radius);
      text-align: left;
      transition: background 120ms;
    }

    .preload-item:hover { background: var(--surface-hover); }
    .preload-item.active { background: var(--accent-glow); color: var(--accent-text); }

    .preload-icon {
      font-size: 15px;
      flex-shrink: 0;
    }

    .preload-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preload-loading {
      padding: 20px;
      text-align: center;
      color: var(--text-soft);
      font-size: 13px;
    }

    .preload-error {
      padding: 12px 16px;
      color: var(--red);
      font-size: 12px;
    }

    /* ── Editor area ── */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      position: relative;
    }

    #editor {
      flex: 1;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      font-family: var(--font-mono);
      font-size: 15px;
      line-height: 1.65;
      resize: none;
      outline: none;
      transition: border-color 150ms;
    }

    #editor:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #editor::placeholder {
      color: var(--text-soft);
    }

    /* ── Controls ── */
    .punchcard-wrap {
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      height: 130px;
      overflow: hidden;
    }
    #punchcardCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 150ms, transform 100ms;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }

    .btn-play {
      background: var(--green);
      color: #1a1a1f;
      min-width: 100px;
    }
    .btn-play:hover { background: #51cf66; }
    .btn-play:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-stop {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      min-width: 100px;
    }
    .btn-stop:hover { background: var(--surface-hover); }

    .btn-preloads {
      display: none;
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 12px 16px;
    }
    .btn-preloads:hover { background: var(--surface-hover); }

    .status-text {
      font-size: 13px;
      color: var(--text-muted);
      margin-left: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status-text.error { color: var(--red); }
    .status-text.playing { color: var(--green); }

    /* ── Error panel ── */
    .error-panel {
      background: rgba(255, 107, 107, 0.08);
      border-top: 1px solid rgba(255, 107, 107, 0.2);
      padding: 12px 20px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--red);
      display: none;
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .error-panel.visible { display: block; }

    /* ── Sidebar overlay (mobile) ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 20;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 21;
        transform: translateX(-100%);
        width: 280px;
        box-shadow: 4px 0 20px rgba(0,0,0,0.3);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .sidebar-close { display: block; }
      .btn-preloads { display: inline-flex; }
      .topbar .attribution { display: none; }
      #editor { font-size: 14px; padding: 14px 16px; }
    }

    @media (max-width: 400px) {
      .topbar-left { gap: 8px; }
      .logo { font-size: 25px; }
      .btn { padding: 10px 18px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo">
        <img class="logo-icon" src="/cinnamon-roll/favicon.png" alt="" />
        cinnamon roll
      </span>
      <span class="attribution">
        a personal <a href="https://strudel.cc" target="_blank" rel="noopener">Strudel</a> player
        &middot; TidalCycles port to JavaScript
      </span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-preloads" id="btnPreloads" aria-label="Open preloads">
        📂 Preloads
      </button>
    </div>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main -->
  <div class="main">
    <!-- Preload sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Preloads</h2>
        <button class="sidebar-close" id="btnSidebarClose" aria-label="Close">&times;</button>
      </div>
      <div class="preload-list" id="preloadList">
        <div class="preload-loading">Loading...</div>
      </div>
    </aside>

    <!-- Editor -->
    <div class="editor-area">
      <div class="editor-container" id="editorContainer">
        <textarea
          id="editor"
          placeholder="s('bd sd').jux(rev)"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="none"
        ></textarea>
      </div>

      <div class="punchcard-wrap" id="punchcardWrap">
        <canvas id="punchcardCanvas"></canvas>
      </div>

      <div class="controls">
        <button class="btn btn-play" id="btnPlay">▶ Play</button>
        <button class="btn btn-pause" id="btnPause">⏸ Pause</button>
        <button class="btn btn-stop" id="btnStop">⏹ Stop</button>
        <span class="status-text" id="statusText"></span>
      </div>

      <div class="error-panel" id="errorPanel"></div>
    </div>
  </div>

  <!-- Strudel engine -->
  <script src="https://unpkg.com/@strudel/web@1.2.6"></script>

  <!-- App -->
  <script>
  (function() {
    /* ── DOM refs ── */
    const editor    = document.getElementById('editor');
    const btnPlay   = document.getElementById('btnPlay');
    const btnPause  = document.getElementById('btnPause');
    const btnStop   = document.getElementById('btnStop');
    const btnPreloads = document.getElementById('btnPreloads');
    const btnSidebarClose = document.getElementById('btnSidebarClose');
    const sidebar   = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const preloadList = document.getElementById('preloadList');
    const statusText = document.getElementById('statusText');
    const errorPanel = document.getElementById('errorPanel');
  
    let repl = null; // Store the Strudel repl instance
  let isPaused = false; // Track pause state
    const punchcardCanvas = document.getElementById('punchcardCanvas');
    const punchcardCtx = punchcardCanvas.getContext('2d');

    let isPlaying = false;
    let activePreload = null;
    let engineReady = false;
    let defaultCps = 0.5; // Strudel default (120 BPM / 2s per cycle), captured at init

    /* ── Sidebar toggle ── */
    function openSidebar() {
      sidebar.classList.add('open');
      sidebarOverlay.classList.add('open');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    }
    btnPreloads.addEventListener('click', openSidebar);
    btnSidebarClose.addEventListener('click', closeSidebar);
    sidebarOverlay.addEventListener('click', closeSidebar);

    /* ── Status / errors ── */
    function setStatus(msg, cls) {
      statusText.textContent = msg;
      statusText.className = 'status-text ' + (cls || '');
    }

    function showError(msg) {
      errorPanel.textContent = msg;
      errorPanel.classList.add('visible');
      setStatus('Error', 'error');
    }

    function clearError() {
      errorPanel.classList.remove('visible');
      errorPanel.textContent = '';
    }

    /* ── Punchcard ── */
    var punchcard = {
      animId: null,
      events: [],     // {time, label} — cycle time + note/sound name
            rows: [],       // unique row labels
            startCycle: 0,
            cycleLen: 1,
            viewRow: 0,
            targetRow: 0,
            _onNote: null,  // event handler ref

      init: function() {
        this.events = [];
        this.rows = [];
        this.resize();
      },

      resize: function() {
        var dpr = window.devicePixelRatio || 1;
        var rect = punchcardCanvas.getBoundingClientRect();
        punchcardCanvas.width = rect.width * dpr;
        punchcardCanvas.height = rect.height * dpr;
        punchcardCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      },
      /** Normalize a note label to canonical form: uppercase root + sharps.
       *  "c3" → "C3", "eb3" → "D#3", "Db3" → "C#3". Passes non-notes through. */
            normalizeLabel: function(label) {
              if (typeof label !== 'string') return label;
              var m = label.match(/^([A-Ga-g])(#|b)?(-?\d+)$/);
              if (!m) return label;
              var root = m[1].toUpperCase();
              var acc = m[2] || '';
              var note = root + acc;
              var flatToSharp = {Db:'C#', Eb:'D#', Fb:'E', Gb:'F#', Ab:'G#', Bb:'A#', Cb:'B'};
              if (flatToSharp[note]) note = flatToSharp[note];
              return note + m[3];
            },

            /** Extract a display label from a hap value.
       *  Handles: strings ("bd"), numbers (note midi), objects ({s:"bd"}, {note:"C4"}, {n:0}) */
            labelFromValue: function(v) {
              if (v == null) return null;
              var self = this;
              function norm(s) { return self.normalizeLabel(s); }
              if (typeof v === 'string') return norm(v);
              if (typeof v === 'number') {
                var nn = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
                var midi = Math.round(v) + 60;
                var oct = Math.floor(midi / 12) - 1;
                return norm(nn[((midi % 12) + 12) % 12] + oct);
              }
              if (typeof v !== 'object') return null;
              if (v.note) return norm(String(v.note));
              if (v.s && !v.note) return String(v.s);  // drum/sample labels don't normalize
              if (v.n != null) {
                var nn = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
                var midi = parseInt(v.n) + 60;
                var oct = Math.floor(midi / 12) - 1;
                return norm(nn[((midi % 12) + 12) % 12] + oct);
              }
              if (v.value != null) return norm(String(v.value));
              if (v.freq) return String(Math.round(12 * Math.log2(v.freq / 440) + 69));
              return null;
            },

            /** Convert note label to MIDI number (e.g. "C4" -> 60, "D#3" -> 51).
             *  Returns null if not a valid note name. */
            noteToMidi: function(label) {
              if (typeof label !== 'string') return null;
              var m = label.match(/^([A-Ga-g])([#b]?)(-?\d+)$/);
              if (!m) return null;
              var noteMap = {C:0, D:2, E:4, F:5, G:7, A:9, B:11};
              var base = noteMap[m[1].toUpperCase()];
              var alter = m[2] === '#' ? 1 : m[2] === 'b' ? -1 : 0;
              var oct = parseInt(m[3]);
              return (oct + 1) * 12 + base + alter;
            },

            /** Check if a MIDI note is a black key. */
            isBlackKey: function(midi) {
              var semitone = midi % 12;
              return semitone === 1 || semitone === 3 || semitone === 6 || semitone === 8 || semitone === 10;
            },

            scrollY: 0,  // Vertical scroll offset (in pixels)

            /** Initialize scroll event listeners. */
            initScroll: function() {
              var self = this;
              var canvas = document.getElementById('punchcardCanvas');
              
              // Mouse wheel scroll
              canvas.addEventListener('wheel', function(e) {
                e.preventDefault();
                self.scrollY += e.deltaY * 0.5;
                // Clamp scroll to valid range
                var maxScroll = Math.max(0, self.totalHeight - self.visibleHeight);
                self.scrollY = Math.max(0, Math.min(maxScroll, self.scrollY));
              });
            },

            start: function() {
              if (this.animId) return;
              this.events = [];
              this.rows = [];
              this.init();
              this.initScroll();

              // Record cycle start
              try { this.startCycle = getTime ? getTime() : 0; } catch(e) { this.startCycle = 0; }
              try { this.cycleLen = cps ? (1 / (cps() || 1)) : 1; } catch(e) { this.cycleLen = 1; }
              if (!isFinite(this.cycleLen) || this.cycleLen <= 0) this.cycleLen = 1;

              var self = this;
              function frame() {
                self.animId = requestAnimationFrame(frame);
                self.draw();
              }
              frame();
            },

            /**
             * Build punchcard data by querying a Pattern.
             * Queries the first cycle (0 to 1) to get the pattern's structure.
             */
            buildFromPattern: function(pattern) {
              if (!pattern || typeof pattern.queryArc !== 'function') return;

              try {
                // Query 128 cycles to capture pattern evolution (e.g., .add() across many cycles)
                var haps = pattern.queryArc(0, 128);
                this.capturedCycles = 128;

                this.events = [];
                this.rows = [];
                var self = this;
                var seen = {};

                haps.forEach(function(hap) {
                  if (!hap.hasOnset || !hap.hasOnset()) return;

                  var label = self.labelFromValue(hap.value);
                  console.log('[pn] DEBUG: hap.value =', hap.value, '→ label =', label);
                  if (!label) return;

                  // Get absolute time position (across cycles)
                  var fract = hap.part && hap.part.begin;
                  var time = 0;
                  try {
                    var f = fract;
                    if (f && typeof f.floor === 'function' && typeof f.sub === 'function') {
                      // Keep the absolute position, don't collapse to 0-1
                      time = Number(f);
                    } else {
                      time = Number(f);
                    }
                  } catch (e) {
                    time = Number(fract) || 0;
                  }
                  if (!isFinite(time)) time = 0;
                  if (time < 0) time = 0;

                  // Dedup by absolute time and label (not cycle-relative)
                  var timeKey = time.toFixed(3);
                  var dedupKey = timeKey + ':' + label;
                  if (seen[dedupKey]) return;
                  seen[dedupKey] = true;

                  self.events.push({ time: time, label: String(label) });

                  if (self.rows.indexOf(String(label)) === -1) {
                    self.rows.push(String(label));
                  }
                });

                // Sort rows by MIDI number (high to low for piano-like orientation)
                // Rows with valid MIDI come first (pitched), followed by non-pitched (drums, etc.)
                var self = this;
                this.rows.sort(function(a, b) {
                  var midiA = self.noteToMidi(a);
                  var midiB = self.noteToMidi(b);
                  var hasA = midiA !== null;
                  var hasB = midiB !== null;
                  // Pitched notes first, sorted high to low
                  if (hasA && !hasB) return -1;
                  if (!hasA && hasB) return 1;
                  if (hasA && hasB) return midiB - midiA;  // descending MIDI
                  // Non-pitched: sort alphabetically
                  return a < b ? -1 : a > b ? 1 : 0;
                });
                
                // Build row metadata for DAW-style layout
                this.rowMeta = [];
                var prevMidi = null;
                for (var r = 0; r < this.rows.length; r++) {
                  var label = this.rows[r];
                  var midi = this.noteToMidi(label);
                  var isBlack = midi !== null ? this.isBlackKey(midi) : false;
                  var interval = midi !== null && prevMidi !== null ? prevMidi - midi : 1;
                  this.rowMeta.push({
                    label: label,
                    midi: midi,
                    isBlack: isBlack,
                    interval: interval
                  });
                  if (midi !== null) prevMidi = midi;
                }
                
                console.log('[pn] Built punchcard:', this.events.length, 'events,', this.rows.length, 'rows:', this.rows);
                console.log('[pn] Row metadata:', this.rowMeta.map(r => r.label + '(' + r.midi + (r.isBlack ? '#' : '') + ')').join(', '));
              } catch (e) {
                console.error('[pn] buildFromPattern error:', e);
              }
            },

            stop: function() {
              if (this.animId) {
                cancelAnimationFrame(this.animId);
                this.animId = null;
              }
              punchcardCtx.clearRect(0, 0, punchcardCanvas.width, punchcardCanvas.height);
            },

      getPlayhead: function() {
        // Use strudel's getTime() which is cycle-based and immune to tempo changes.
        // It returns the current absolute cycle position (a Fraction-like number).
        try {
          if (typeof getTime === 'function') {
            var t = getTime();
            // Convert Fraction or number to [0, 1) range via floor + sub
            if (t && typeof t.floor === 'function' && typeof t.sub === 'function') {
              var floored = t.floor();
              return Number(t.sub(floored));
            }
            // Plain number fallback
            var n = Number(t);
            return isFinite(n) ? n - Math.floor(n) : 0;
          }
        } catch(e) {}
        // Strudel not initialized yet — use perf.now as last resort
        return (performance.now() / 1000) % 1;
      },

      draw: function() {
        var ctx = punchcardCtx;
        var dpr = window.devicePixelRatio || 1;
        var w = punchcardCanvas.width / dpr;
        var h = punchcardCanvas.height / dpr;

        // Dark background
        ctx.fillStyle = '#1a1a1f';
        ctx.fillRect(0, 0, w, h);

        if (!this.events || this.events.length === 0) return;

        // Find the octave range from active notes
        var minOctave = 4;
        var maxOctave = 4;
        var self = this;
        this.events.forEach(function(ev) {
          var midi = self.noteToMidi(ev.label);
          if (midi !== null) {
            // Invert noteToMidi: (oct+1)*12+base → oct = floor(midi/12) - 1
            var oct = Math.floor(midi / 12) - 1;
            if (oct < minOctave) minOctave = oct;
            if (oct > maxOctave) maxOctave = oct;
          }
        });
        var octaveSpan = maxOctave - minOctave + 1;
        
        // Generate all 12 semitone rows per octave (from high to low)
        var noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        var allRows = [];
        for (var oct = maxOctave; oct >= minOctave; oct--) {
          for (var i = 11; i >= 0; i--) {
            allRows.push(noteNames[i] + oct);
          }
        }
        
        var nRows = allRows.length;
        var labelW = 60;
        var gridW = w - labelW - 8;
        var visibleHeight = h;
        
        // Build row layout with variable heights: white keys full, black keys half
        var BLACK_FACTOR = 0.5;
        var nWhites = 0, nBlacks = 0;
        for (var ri = 0; ri < nRows; ri++) {
          var m = this.noteToMidi(allRows[ri]);
          (m !== null && this.isBlackKey(m)) ? nBlacks++ : nWhites++;
        }
        var unitH = visibleHeight / (nWhites + nBlacks * BLACK_FACTOR);
        var rowLayout = [];
        var cumY = 0;
        for (var ri = 0; ri < nRows; ri++) {
          var label = allRows[ri];
          var midi = this.noteToMidi(label);
          var isBlack = midi !== null && this.isBlackKey(midi);
          var rh = isBlack ? unitH * BLACK_FACTOR : unitH;
          rowLayout.push({ label: label, midi: midi, isBlack: isBlack, y: cumY, h: rh });
          cumY += rh;
        }
        var totalHeight = cumY;
        
        // Store for scroll clamping
        this.totalHeight = totalHeight;
        this.visibleHeight = visibleHeight;
        
        // Debug: log what we're rendering
        if (!this._lastDrawLog || performance.now() - this._lastDrawLog > 2000) {
          console.log('[pn] DRAW: allRows =', allRows);
          console.log('[pn] DRAW: nRows =', nRows, 'unitH =', unitH.toFixed(1), 'totalHeight =', totalHeight.toFixed(1));
          console.log('[pn] DRAW: scrollY =', this.scrollY.toFixed(1), 'visibleHeight =', visibleHeight.toFixed(1));
          this._lastDrawLog = performance.now();
        }
        
        // Get absolute time to calculate actual cycle number
        var absoluteTime = getTime ? getTime() : 0;
        if (absoluteTime && typeof absoluteTime.floor === 'function') {
          // Fraction object - convert to number
          absoluteTime = Number(absoluteTime);
        }
        var currentCycle = Math.floor(absoluteTime);
        var ph = absoluteTime - currentCycle; // Position within current cycle (0 to 1)
        var PLAYHEAD_X = labelW + 4;
        
        // Auto-scroll to follow notes in visible window
        if (this.events && this.events.length > 0) {
          var self = this;
          var capturedLen = this.capturedCycles || 128;
          
          // Use modulo wrapping so the scroll keeps working past the captured range
          var wrappedCycle = currentCycle % capturedLen;
          
          // Search a wider window (current cycle ± 2) to catch sparse patterns
          var visibleEvents = this.events.filter(function(ev) {
            var evCycle = Math.floor(ev.time) % capturedLen;
            for (var offset = -2; offset <= 2; offset++) {
              if (evCycle === ((wrappedCycle + offset) % capturedLen + capturedLen) % capturedLen) return true;
            }
            return false;
          });
          
          // If window search found nothing, find the nearest future event
          if (visibleEvents.length === 0) {
            var nearestDist = Infinity;
            var nearestEv = null;
            this.events.forEach(function(ev) {
              var evCycle = Math.floor(ev.time) % capturedLen;
              var dist = ((evCycle - wrappedCycle) % capturedLen + capturedLen) % capturedLen;
              if (dist < nearestDist) {
                nearestDist = dist;
                nearestEv = ev;
              }
            });
            if (nearestEv) visibleEvents = [nearestEv];
          }
          
          if (visibleEvents.length > 0) {
            // Find min/max MIDI of events in visible cycle range
            var minMidi = Infinity, maxMidi = -Infinity;
            visibleEvents.forEach(function(ev) {
              var midi = self.noteToMidi(ev.label);
              if (midi !== null) {
                if (midi < minMidi) minMidi = midi;
                if (midi > maxMidi) maxMidi = midi;
              }
            });
          
            if (minMidi !== Infinity && maxMidi !== -Infinity) {
              // Find row indices for the highest and lowest notes
              // allRows is ordered high to low, so row 0 is highest, nRows-1 is lowest
              var topRow = 0, bottomRow = nRows - 1;
              for (var r = 0; r < nRows; r++) {
                var midi = this.noteToMidi(allRows[r]);
                if (midi === maxMidi) topRow = r;
                if (midi === minMidi) bottomRow = r;
              }
            
              // Calculate the center of the range
              var rangeSpan = bottomRow - topRow + 1;
              var centerRow = topRow + Math.floor(rangeSpan / 2);
            
              // Calculate scroll offset to center the range using rowLayout positions
              var viewportCenterY = visibleHeight / 2;
              var targetRowLayout = rowLayout[centerRow];
              var targetScrollY = targetRowLayout.y - viewportCenterY + (targetRowLayout.h / 2);
            
              // Clamp target to valid range
              var maxScrollLimit = Math.max(0, totalHeight - visibleHeight);
              targetScrollY = Math.max(0, Math.min(maxScrollLimit, targetScrollY));
              
              // Aggressive smoothing: instant jump if far away, otherwise smooth
              var delta = targetScrollY - this.scrollY;
              if (Math.abs(delta) > unitH * 2) {
                this.scrollY = targetScrollY;
              } else {
                this.scrollY += delta * 0.15;
              }
            }
          }
        }
        
        // Clamp scrollY
        var maxScroll = Math.max(0, totalHeight - visibleHeight);
        this.scrollY = Math.max(0, Math.min(maxScroll, this.scrollY));

        // ─── Label column (drawn OUTSIDE grid clip so labels are always visible) ───
        for (var r = 0; r < nRows; r++) {
          var rl = rowLayout[r];
          var y = rl.y - this.scrollY;
          
          // Skip rows outside visible area
          if (y + rl.h < 0 || y > visibleHeight) continue;

          // Label column background: black keys darker, narrower
          var labelX = labelW;
          if (rl.isBlack) {
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            // Only fill a narrower strip for black keys (left side)
            ctx.fillRect(0, y, labelW - 10, rl.h);
          } else {
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillRect(0, y, labelW, rl.h);
          }

          // Label text: black keys indented left, smaller
          if (rl.isBlack) {
            ctx.fillStyle = '#777788';
            ctx.font = '9px monospace';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            ctx.fillText(rl.label, labelW - 10, y + rl.h / 2);
          } else {
            ctx.fillStyle = '#bbbcc8';
            ctx.font = '11px monospace';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            ctx.fillText(rl.label, labelW - 6, y + rl.h / 2);
          }
        }

        // ─── Grid area (clipped so notes don't spill over labels) ───
        ctx.save();
        ctx.beginPath();
        ctx.rect(labelW + 4, 0, gridW, h);
        ctx.clip();

        // Row backgrounds and separators
        for (var r = 0; r < nRows; r++) {
          var rl = rowLayout[r];
          var y = rl.y - this.scrollY;
          
          // Skip rows outside visible area
          if (y + rl.h < 0 || y > visibleHeight) continue;

          // Row background: black keys darker
          if (rl.isBlack) {
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
          } else {
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
          }
          ctx.fillRect(labelW + 4, y, gridW, rl.h);

          // Row separator
          ctx.strokeStyle = 'rgba(255,255,255,0.08)';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(labelW + 4, y + rl.h);
          ctx.lineTo(labelW + 4 + gridW, y + rl.h);
          ctx.stroke();
        }

        // Note events - draw using absolute time positions
        for (var r = 0; r < nRows; r++) {
          var rl = rowLayout[r];
          var y = rl.y - this.scrollY;
          
          // Skip rows outside visible area
          if (y + rl.h < 0 || y > visibleHeight) continue;
          
          (this.events || []).forEach(function(ev) {
            if (ev.label !== rl.label) return;
            // Calculate relative position from current playhead position
            var relTime = ev.time - absoluteTime;
            var pixelOffset = relTime * gridW;
            var ex = PLAYHEAD_X + pixelOffset;
            var ew = Math.max(3, gridW / 80);
            var eh = rl.h - 2;
            
            if (ex + ew < labelW + 4 || ex > labelW + 4 + gridW) return;

            var dist = Math.abs(relTime);
            var alpha = Math.max(0.08, 0.75 - dist * 0.5);
            if (dist > 3) alpha = 0.05;

            ctx.fillStyle = 'rgba(255,140,140,' + alpha.toFixed(2) + ')';
            ctx.beginPath();
            ctx.roundRect(ex, y + 1, ew, eh, 2);
            ctx.fill();
          });
        }

        ctx.restore();

        // Playhead line (stationary, full height, drawn on top of everything)
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(PLAYHEAD_X, 0);
        ctx.lineTo(PLAYHEAD_X, h);
        ctx.stroke();

        // Playhead triangle on top
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.beginPath();
        ctx.moveTo(PLAYHEAD_X - 5, 0);
        ctx.lineTo(PLAYHEAD_X + 5, 0);
        ctx.lineTo(PLAYHEAD_X, 6);
        ctx.closePath();
        ctx.fill();

        // Beat markers (scroll with grid, clipped to grid area)
        ctx.save();
        ctx.beginPath();
        ctx.rect(labelW + 4, 0, gridW, h);
        ctx.clip();
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 0.5;
        for (var b = -8; b <= 8; b++) {
          var bx = PLAYHEAD_X + (b / 4 - ph) * gridW;
          if (bx < labelW + 4 || bx > labelW + 4 + gridW) continue;
          ctx.beginPath();
          ctx.moveTo(bx, 0);
          ctx.lineTo(bx, h);
          ctx.stroke();
        }
        ctx.restore();
      }
    };

    /* ── Engine init ── */
    async function initEngine() {
      setStatus('Loading samples...');
      try {
        // initStrudel is global from @strudel/web script
        repl = await initStrudel({
          prebake: () => samples('samples/strudel.json'),
        });
        console.log('[repl] initialized, methods:', Object.keys(repl || {}));
        engineReady = true;
        setStatus('Ready');

        // Capture the initial cps so Stop can restore it after user setcps() calls
        try { if (typeof cps === 'function') defaultCps = Number(cps()) || 0.5; } catch(e) {}
        console.log('[repl] defaultCps captured as:', defaultCps);

        // Catch runtime errors from the pattern scheduler
        document.addEventListener('strudel.log', function(e) {
          if (e.detail && e.detail.type === 'error') {
            showError(e.detail.message || 'Runtime error');
          }
        });
      } catch (e) {
        engineReady = false;
        setStatus('Failed to load samples', 'error');
        console.error(e);
      }
    }

    /* ── Play / Pause / Stop ── */
    /* Piano roll: evaluate() returns the Pattern; we queryArc() it directly to get hap events.
     * No code wrapping, no hooks, no CustomEvents needed. */

    async function play() {
      if (!engineReady) {
        setStatus('Samples still loading...', 'error');
        return;
      }
      var code = editor.value.trim();
      if (!code) return;

      clearError();
      try {
        punchcard.start();

        // evaluate() returns a pattern, but may only be the last line in multiline code.
        // Check multiple sources for the full playing pattern:
        var evalPattern = await evaluate(code);
        console.log('[pn] evaluate() returned:', evalPattern ? 'pattern' : typeof evalPattern);
        console.log('[pn] repl object:', repl ? Object.keys(repl) : 'null');
        
        var pattern = null;
        if (repl && repl.pattern) {
          pattern = repl.pattern;
          console.log('[pn] pattern source: repl.pattern');
        } else if (repl && typeof repl.getPattern === 'function') {
          pattern = repl.getPattern();
          console.log('[pn] pattern source: repl.getPattern()');
        } else if (evalPattern && typeof evalPattern.queryArc === 'function') {
          pattern = evalPattern;
          console.log('[pn] pattern source: evaluate() return value');
        }
        
        console.log('[pn] final pattern:', pattern ? 'found' : 'none');

        isPlaying = true;
        isPaused = false;
        setStatus('Playing', 'playing');

        if (pattern) punchcard.buildFromPattern(pattern);
      } catch (e) {
        showError(e.message || String(e));
        isPlaying = false;
      }
    }

    function pause() {
      // Pause just mutes audio but keeps the scheduler running
      // On next play(), it will continue from where it was
      try { evaluate('hush()'); } catch(e) {}
      try { if (typeof hush !== 'undefined') hush(); } catch(e) {}
      isPlaying = false;
      isPaused = true;
      setStatus('Paused');
      punchcard.stop();
    }

    function stop() {
      // Stop resets the entire environment: mute, reset clock, reset tempo,
      // clear patterns. Next play() will start from the beginning.
      // The textarea content is preserved — user's code stays put.
      try { evaluate('hush()'); } catch(e) {}
      try { if (typeof hush !== 'undefined') hush(); } catch(e) {}
      
      // Reset the clock to 0 - Strudel uses a scheduler with a time property
      if (repl && repl.scheduler) {
        if (typeof repl.scheduler.resetTime === 'function') {
          repl.scheduler.resetTime();
        }
        repl.scheduler.time = 0;
      }
      if (repl && typeof repl.reset === 'function') {
        repl.reset();
      } else if (typeof resetClock !== 'undefined') {
        resetClock();
      }
      
      // Reset tempo back to the default captured at init time.
      // setcps() mutates the global scheduler, not the pattern — persists across plays.
      try {
        if (typeof setcps === 'function') {
          setcps(defaultCps);
        } else {
          evaluate('setcps(' + defaultCps + ')');
        }
      } catch (e) {
        console.warn('[stop] could not reset cps:', e);
      }
      
      isPlaying = false;
      isPaused = false;
      setStatus('Stopped');
      punchcard.stop();
    }

    btnPlay.addEventListener('click', play);
    btnPause.addEventListener('click', pause);
    btnStop.addEventListener('click', stop);

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      // Ctrl+Enter / Cmd+Enter to play
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        play();
      }
      // Escape to pause
      if (e.key === 'Escape' && document.activeElement !== editor) {
        pause();
      }
    });

    /* ── Preloads ── */
    const PRELOADS_BASE = 'preloads';

    async function loadPreloads() {
      try {
        const resp = await fetch(PRELOADS_BASE + '/manifest.json');
        if (!resp.ok) throw new Error('manifest: ' + resp.status);

        const preloads = await resp.json();

        if (preloads.length === 0) {
          preloadList.innerHTML = '<div class="preload-loading">No preloads yet</div>';
          return;
        }

        preloadList.innerHTML = '';
        preloads.forEach(function(entry) {
          const item = document.createElement('button');
          item.className = 'preload-item';
          item.innerHTML =
            '<span class="preload-icon">📄</span>' +
            '<span class="preload-name">' + escapeHtml(entry.name) + '</span>';
          item.addEventListener('click', function() {
            loadPreloadFile(PRELOADS_BASE + '/' + entry.file, entry.name);
          });
          preloadList.appendChild(item);
        });
      } catch (e) {
        preloadList.innerHTML =
          '<div class="preload-error">Could not load preloads: ' +
          escapeHtml(e.message) + '</div>';
        console.error(e);
      }
    }

    async function loadPreloadFile(url, name) {
      setStatus('Loading ' + name + '...');
      clearError();
      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const code = await resp.text();

        editor.value = code;

        // Update active state in sidebar
        document.querySelectorAll('.preload-item').forEach(function(el) {
          el.classList.remove('active');
        });
        var items = document.querySelectorAll('.preload-item');
        items.forEach(function(el) {
          if (el.querySelector('.preload-name').textContent === name) {
            el.classList.add('active');
          }
        });
        activePreload = name;

        setStatus('Loaded: ' + name);

        // Auto-play on load
        stop();
        setTimeout(function() { play(); }, 100);

        // Close sidebar on mobile
        if (window.innerWidth <= 768) {
          closeSidebar();
        }
      } catch (e) {
        showError('Failed to load ' + name + ': ' + e.message);
      }
    }

    /* ── URL param: ?load=filename ── */
    function handleUrlParams() {
      var params = new URLSearchParams(window.location.search);
      var loadFile = params.get('load');
      if (loadFile) {
        loadPreloadFile(PRELOADS_BASE + '/' + loadFile + '.js', loadFile);
      }
    }

    /* ── Helpers ── */
    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /* ── Bootstrap ── */
    initEngine();
    loadPreloads();
    handleUrlParams();

    // Keep punchcard sized on window resize
    window.addEventListener('resize', function() {
      punchcard.resize();
    });

    /* ── Auto-resize editor on window resize ── */
    // (textarea fills flex container, no manual resize needed)

    // Report ready
    console.log('%ccinnamon roll ready %cjoverval.cl/cinnamon-roll',
      'color:#ff8a8a;font-weight:bold', 'color:#888');
  })();
  </script>
